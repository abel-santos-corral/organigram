name: 'Organigram'
type: module
description: 'Organigram node content type, Organigram Node Type config entity, and D3.js organigram renderer. Supports hierarchical and matrix organisational charts with fully configurable node/line visual styles.'
core_version_requirement: ^10 || ^11
package: Organigram
dependencies:
  - drupal:node
  - drupal:file
  - drupal:image
  - drupal:link
  - drupal:datetime
  - drupal:text
