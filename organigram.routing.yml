# Renders the full organigram page for a root organigram_node.
organigram.display:
  path: '/organigram/{node}'
  defaults:
    _controller: '\Drupal\organigram\Controller\OrganigramController::display'
    _title_callback: '\Drupal\organigram\Controller\OrganigramController::title'
  requirements:
    _permission: 'access content'
    _entity_access: 'node.view'
    node: \d+

# Returns the full tree as JSON consumed by the active renderer.
organigram.data:
  path: '/organigram/{node}/data'
  defaults:
    _controller: '\Drupal\organigram\Controller\OrganigramController::data'
  requirements:
    _permission: 'access content'
    node: '\d+'
  options:
    parameters:
      node:
        type: entity:node

# Global Organigram settings: active renderer selector.
organigram.settings:
  path: '/admin/config/organigram'
  defaults:
    _form: '\Drupal\organigram\Form\OrganigramSettingsForm'
    _title: 'Organigram settings'
  requirements:
    _permission: 'administer organigram'
