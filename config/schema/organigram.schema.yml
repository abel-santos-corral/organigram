# Schema for the Organigram module's config entities and settings.

organigram.organigram_node_type.*:
  type: config_entity
  label: 'Organigram Node Type'
  mapping:
    id:
      type: string
      label: 'Machine name'
    label:
      type: label
      label: 'Name'
    uuid:
      type: string
      label: 'UUID'
    box_font_size:
      type: integer
      label: 'Box font size (px)'
    box_font_color:
      type: string
      label: 'Box font colour (hex)'
    box_background:
      type: string
      label: 'Box background colour (hex)'
    line_size:
      type: string
      label: 'Line width'
    line_color:
      type: string
      label: 'Line colour (hex)'
    line_type:
      type: string
      label: 'Line type'

organigram.settings:
  type: config_object
  label: 'Organigram settings'
  mapping:
    active_renderer:
      type: string
      label: 'Active renderer plugin ID'

# Schema for the OrganigramBlock plugin instance configuration.
block.settings.organigram_block:
  type: block_settings
  label: 'Organigram block settings'
  mapping:
    root_node_id:
      type: integer
      label: 'Root node ID'
