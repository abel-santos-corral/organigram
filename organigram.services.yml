services:

  organigram.graph_builder:
    class: Drupal\organigram\Service\OrganigramGraphBuilder
    arguments:
      - '@entity_type.manager'
      - '@file_url_generator'
      - '@module_handler'

  plugin.manager.organigram_renderer:
    class: Drupal\organigram\OrganigramRendererManager
    parent: default_plugin_manager
    arguments:
      - '@container.namespaces'
      - '@cache.discovery'
      - '@module_handler'
